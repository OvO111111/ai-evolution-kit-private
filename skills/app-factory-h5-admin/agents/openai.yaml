display_name: H5 + Unified Admin App Factory
short_description: Builds company/work H5 projects from the 声之境 + unified admin reference pattern.
default_prompt: Use this skill only when creating or adapting a company/work H5 project like 每周穿搭 under the existing unified admin platform, or when the user explicitly asks to reuse the 声之境 H5/admin app-factory pattern. First analyze sources, decompose the core H5 experience, and ask blocking questions; then build the 750px H5 prototype for confirmation; only after H5 is confirmed, decompose and build the admin prototype; write the PRD only after both prototypes are confirmed. Do not use this for generic H5 pages, personal projects, open-source projects, landing pages, or unrelated product work.
